name: Publish to PyPI

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
  CIBW_SKIP: "*-musllinux_*"
  CIBW_TEST_COMMAND: >-
    python -c "import sqq.core._sqq_cpp as native;
    assert native.core_version() == '0.3.3', native.core_version()"

jobs:
  build-wheels:
    name: Build ${{ matrix.platform }} wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-latest
            arch: x86_64
          - platform: windows-x86_64
            os: windows-latest
            arch: AMD64
          - platform: macos-x86_64
            os: macos-15-intel
            arch: x86_64
          - platform: macos-arm64
            os: macos-15
            arch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build and test wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
        with:
          package-dir: .
          output-dir: wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: distribution-${{ matrix.platform }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build source distribution
        run: python -m build --sdist --outdir dist

      - name: Check source distribution
        run: python -m twine check dist/*.tar.gz

      - name: Upload source distribution
        uses: actions/upload-artifact@v4
        with:
          name: distribution-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish distributions
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: distribution-*
          path: dist
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check distributions
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true